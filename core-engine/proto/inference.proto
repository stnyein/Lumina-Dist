syntax = "proto3";
package inference;

service InferenceProvider {
  rpc DistributeWeights (WeightPackage) returns (TransferStatus);
}

message WeightPackage {
  bytes data = 1;      // The serialized raw matrix bytes
  uint32 rows = 2;     // Number of rows
  uint32 cols = 3;     // Number of columns
}

message TransferStatus {
  bool received = 1;
  string node_id = 2;
  bytes result_data = 3; // The computed matrix answer sent back to Master!
}
